<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RakshaAI</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #1e293b;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
    }
    p {
      color: #cbd5e1;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      margin: 12px 8px;
      padding: 12px 20px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      background: #2563eb;
    }
    a.secondary {
      background: #22c55e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>RakshaAI</h1>
    <p>Welcome to RakshaAI. Use the links below to open the friend sender and admin dashboard.</p>
    <p>
      <a href="/phone_sender.html">Friend Sharing Page</a>
      <a class="secondary" href="/dashboard.html">Admin Dashboard</a>
    </p>
    <p>If you want the FastAPI backend as well, deploy the backend service separately or use the ngrok backend URL.</p>
  </div>
</body>
</html>
